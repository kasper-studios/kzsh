# KASPERENOK ZSH Configuration
bun_default: yes
first_run: yes
auto_start_session: yes  # Auto-start desktop session on TTY1
auto_update: yes  # Auto-update KZSH from GitHub (once per day)

# ============================================
# DISTRIBUTION-SPECIFIC CONFIGURATION
# ============================================

# --- ARCH LINUX PROFILES ---
profile_arch_mandatory: curl git zsh bat lsd ripgrep fzf zoxide unzip neovim fontconfig networkmanager
profile_arch_core: fastfetch btop tree rsync wget htop nano
profile_arch_dev: nodejs npm docker docker-compose base-devel python python-pip rust go neovim
profile_arch_desktop_gnome: gnome gnome-extra gdm
profile_arch_desktop_kde: plasma-meta kde-applications sddm

# --- ARCH LINUX DESKTOP SPECIFIC ---
profile_arch_desktop_niri: niri sddm kitty tofi swaybg xdg-desktop-portal xdg-desktop-portal-gtk xorg-xwayland qt6-wayland qt5-wayland qt6-declarative pipewire pipewire-pulse pipewire-alsa wireplumber grim slurp wl-clipboard firefox thunar file-roller xdg-user-dirs brightnessctl playerctl

# --- DEBIAN/UBUNTU PROFILES ---
profile_debian_mandatory: curl git zsh bat lsd ripgrep fzf zoxide unzip neovim fontconfig network-manager
profile_debian_core: fastfetch btop
profile_debian_dev: nodejs docker.io docker-compose build-essential

# --- GENERIC FALLBACK PROFILES ---
profile_media: chromium firefox discord mpv vlc gimp inkscape
profile_extra: steam wine obs-studio
