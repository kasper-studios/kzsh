<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZSH Терморегулятор</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --purple: #b388eb;
            --purple-dark: #7c4dff;
            --purple-light: #e0b6ff;
            --black: #0a0a0a;
            --gray: #1a1a1a;
            --green: #4CAF50;
            --red: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            background: var(--black);
            border: 1px solid var(--purple);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 900px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: var(--purple);
            margin-bottom: 30px;
            font-size: 28px;
        }
        .temp-display { text-align: center; margin: 30px 0; }
        .temp-value { font-size: 72px; font-weight: bold; color: var(--purple); }
        .temp-label { font-size: 18px; color: var(--purple-light); margin-top: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: var(--gray); border: 1px solid var(--purple); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; color: var(--purple-light); margin-bottom: 5px; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--purple); }
        
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--gray); border-radius: 10px; }
        
        button { padding: 10px 25px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-turbo { background: var(--green); color: white; }
        .btn-turbo.off { background: var(--red); }
        
        .status { text-align: center; margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 14px; }
        .status.warning { background: rgba(244, 67, 54, 0.2); color: var(--red); border: 1px solid var(--red); }
        .status.ok { background: rgba(76, 175, 80, 0.2); color: var(--green); border: 1px solid var(--green); }
        
        .footer { text-align: center; padding: 20px; opacity: 0.8; font-size: 12px; margin-top: 30px; border-top: 1px solid var(--purple); color: var(--purple-light); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ KZSH Терморегулятор</h1>
        <div class="temp-display">
            <div class="temp-value" id="temp">--</div>
            <div class="temp-label">°C</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Нагрузка</div><div class="stat-value" id="load">--</div></div>
            <div class="stat-card"><div class="stat-label">Макс. темп.</div><div class="stat-value" id="maxTemp">--</div></div>
            <div class="stat-card"><div class="stat-label">Средняя темп.</div><div class="stat-value" id="avgTemp">--</div></div>
        </div>
        <div class="status ok" id="status">Система работает нормально</div>
        <footer class="footer">
            <p>🔧 KZSH by @kasperenok</p>
        </footer>
    </div>
</body>
</html>
